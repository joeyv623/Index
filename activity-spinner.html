<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Spinner App</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }
        #spinner {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 10px solid #3498db;
            border-top: 10px solid transparent;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #activity {
            margin-top: 20px;
            font-size: 24px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="spinner"></div>
    <div id="activity">Spin to find an activity!</div>
    <script>
        const activities = [
            'Go for a walk',
            'Do some yoga',
            'Read a book',
            'Learn a new language',
            'Cook a new recipe',
            'Watch a movie',
            'Do some gardening',
            'Take a nap',
            'Try a new workout',
            'Call a friend'
        ];

        const spinner = document.getElementById('spinner');
        const activityDisplay = document.getElementById('activity');

        spinner.addEventListener('click', () => {
            const randomIndex = Math.floor(Math.random() * activities.length);
            activityDisplay.innerText = activities[randomIndex];
        });
    </script>
</body>
</html>
